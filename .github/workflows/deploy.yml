name: Deploy to Hostinger

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: FTP

    steps:
      - name: Obter o código
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: mbstring, xml, ctype, iconv, intl, pdo_mysql, dom, filter, gd, json, openssl, pcre, session, tokenizer, fileinfo
          coverage: none

      - name: Instalar dependências backend (produção)
        run: composer install --no-dev --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist --optimize-autoloader

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Instalar dependências frontend
        run: npm ci

      - name: Compilar frontend (Vite)
        run: npm run build

      - name: Preparar .env de produção
        run: printenv ENV_PRODUCTION > .env
        env:
          ENV_PRODUCTION: ${{ secrets.ENV_PRODUCTION }}

      - name: Gerar cache de produção
        run: |
          php artisan config:cache
          php artisan route:cache
          php artisan view:cache

      - name: Upload via FTP para Hostinger
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./
          server-dir: /public_html/v2/
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/tests/**
            **/.github/**
            .env.example
            .editorconfig
            README.md
            phpunit.xml
            docker-compose.yml
            webpack.mix.cjs
            vite.config.js
            tsconfig.json
            tsconfig.node.json
            postcss.config.js
            tailwind.config.js
            package.json
            package-lock.json
            Prontuario.rar
            **/storage/logs/**
            **/storage/framework/cache/data/**
            **/storage/framework/sessions/**
            **/storage/framework/views/**
